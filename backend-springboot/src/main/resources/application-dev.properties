server.port=8081
spring.application.name=ph-transparente-api

# H2 Database Configuration (Local Development - In-memory)
spring.datasource.url=jdbc:h2:mem:phdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (Enabled for local development)
spring.h2.console.enabled=true

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173,http://localhost:5174
