server.port=${SERVER_PORT:8081}
server.address=0.0.0.0
spring.application.name=ph-transparente-api

# PostgreSQL Database Configuration
# En OpenShift/Red Hat Sandbox configurar DATABASE_URL, DATABASE_USERNAME y DATABASE_PASSWORD
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5434/phdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:phtransparente@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:tu_contraseña_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App email sender
app.email.from=${EMAIL_FROM:phtransparente@gmail.com}

# JWT Secret (en producción configurar JWT_SECRET obligatoriamente)
app.jwt.secret=${JWT_SECRET:cGh0cmFuc3BhcmVudGVfc2VjcmV0X2tleV9kZXZfMjA0OA==}
