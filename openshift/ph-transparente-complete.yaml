# PH TRANSPARENTE - DESPLIEGUE COMPLETO EN OPENSHIFT
# Repositorio:
# https://github.com/hectorandresladino/PH_TRANSPARENTE_REACT
#
# Antes de producción, cambie las contraseñas del Secret.

apiVersion: v1
kind: Secret
metadata:
  name: ph-transparente-secrets
  labels:
    app.kubernetes.io/part-of: ph-transparente
type: Opaque
stringData:
  database-url: "jdbc:postgresql://ph-postgresql:5432/phdb"
  database-username: "phuser"
  database-password: "PhTransparente_2026_Segura!"
  jwt-secret: "PH_TRANSPARENTE_JWT_2026_CLAVE_SEGURA_CAMBIAR_ANTES_DE_PRODUCCION_987654321"
  email-username: ""
  email-password: ""

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ph-postgresql-pvc
  labels:
    app: ph-postgresql
    app.kubernetes.io/part-of: ph-transparente
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ph-postgresql
  labels:
    app: ph-postgresql
    app.kubernetes.io/part-of: ph-transparente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ph-postgresql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ph-postgresql
        app.kubernetes.io/part-of: ph-transparente
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "phdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: ph-postgresql-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ph-postgresql
  labels:
    app: ph-postgresql
    app.kubernetes.io/part-of: ph-transparente
spec:
  type: ClusterIP
  selector:
    app: ph-postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP

---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ph-backend
  labels:
    app: ph-backend
    app.kubernetes.io/part-of: ph-transparente

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ph-backend
  labels:
    app: ph-backend
    app.kubernetes.io/part-of: ph-transparente
spec:
  source:
    type: Git
    git:
      uri: "https://github.com/hectorandresladino/PH_TRANSPARENTE_REACT.git"
      ref: "main"
    contextDir: "backend-springboot"
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: "Dockerfile"
  output:
    to:
      kind: ImageStreamTag
      name: ph-backend:latest
  triggers:
    - type: ConfigChange

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ph-backend
  labels:
    app: ph-backend
    app.kubernetes.io/part-of: ph-transparente
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"ph-backend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"backend\")].image","pause":false}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ph-backend
  template:
    metadata:
      labels:
        app: ph-backend
        app.kubernetes.io/part-of: ph-transparente
    spec:
      containers:
        - name: backend
          image: ph-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-url
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: jwt-secret
            - name: EMAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: email-username
            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: email-password
            - name: CORS_ALLOWED_ORIGINS
              value: "*"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: ph-backend
  labels:
    app: ph-backend
    app.kubernetes.io/part-of: ph-transparente
spec:
  type: ClusterIP
  selector:
    app: ph-backend
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ph-backend
  labels:
    app: ph-backend
    app.kubernetes.io/part-of: ph-transparente
spec:
  to:
    kind: Service
    name: ph-backend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ph-frontend
  labels:
    app: ph-frontend
    app.kubernetes.io/part-of: ph-transparente

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ph-frontend
  labels:
    app: ph-frontend
    app.kubernetes.io/part-of: ph-transparente
spec:
  source:
    type: Git
    git:
      uri: "https://github.com/hectorandresladino/PH_TRANSPARENTE_REACT.git"
      ref: "main"
    contextDir: "frontend-react"
    dockerfile: |
      FROM node:20-alpine AS build
      WORKDIR /app
      ARG VITE_API_URL=/api
      COPY package*.json ./
      RUN npm ci || npm install
      COPY . .
      RUN VITE_API_URL=${VITE_API_URL} npm run build

      FROM nginxinc/nginx-unprivileged:1.27-alpine
      USER root
      COPY --from=build /app/dist /usr/share/nginx/html
      RUN printf '%s\n' \
          'server {' \
          '  listen 8080;' \
          '  server_name _;' \
          '  root /usr/share/nginx/html;' \
          '  index index.html;' \
          '  location = /api { return 308 /api/; }' \
          '  location /api/ {' \
          '    proxy_pass http://ph-backend:8081/api/;' \
          '    proxy_http_version 1.1;' \
          '    proxy_set_header Host $host;' \
          '    proxy_set_header X-Real-IP $remote_addr;' \
          '    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
          '    proxy_set_header X-Forwarded-Proto $scheme;' \
          '  }' \
          '  location / {' \
          '    try_files $uri $uri/ /index.html;' \
          '  }' \
          '}' \
          > /etc/nginx/conf.d/default.conf \
          && chgrp -R 0 /etc/nginx /var/cache/nginx /var/run /usr/share/nginx/html \
          && chmod -R g=u /etc/nginx /var/cache/nginx /var/run /usr/share/nginx/html
      USER 101
      EXPOSE 8080
  strategy:
    type: Docker
    dockerStrategy:
      buildArgs:
        - name: VITE_API_URL
          value: "/api"
  output:
    to:
      kind: ImageStreamTag
      name: ph-frontend:latest
  triggers:
    - type: ConfigChange

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ph-frontend
  labels:
    app: ph-frontend
    app.kubernetes.io/part-of: ph-transparente
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"ph-frontend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frontend\")].image","pause":false}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ph-frontend
  template:
    metadata:
      labels:
        app: ph-frontend
        app.kubernetes.io/part-of: ph-transparente
    spec:
      containers:
        - name: frontend
          image: ph-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: ph-frontend
  labels:
    app: ph-frontend
    app.kubernetes.io/part-of: ph-transparente
spec:
  type: ClusterIP
  selector:
    app: ph-frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ph-frontend
  labels:
    app: ph-frontend
    app.kubernetes.io/part-of: ph-transparente
spec:
  to:
    kind: Service
    name: ph-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
