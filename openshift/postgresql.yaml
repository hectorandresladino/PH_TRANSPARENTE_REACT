apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ph-postgresql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ph-postgresql
  labels:
    app: ph-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ph-postgresql
  template:
    metadata:
      labels:
        app: ph-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "phdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ph-transparente-secrets
                  key: database-password
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: ph-postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ph-postgresql
  labels:
    app: ph-postgresql
spec:
  selector:
    app: ph-postgresql
  ports:
    - port: 5432
      targetPort: 5432
