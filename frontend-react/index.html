<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#123b62" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Sistema de gestión de propiedad horizontal" />
    <title>PH Transparente</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #loading { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #123b62 0%, #1e5a8a 100%); }
      #loading div { text-align: center; color: white; }
      #loading h1 { margin: 0 0 10px; font-size: 24px; }
      #loading p { margin: 0; opacity: 0.8; }
      .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div>
        <h1>PH Transparente</h1>
        <div class="spinner"></div>
        <p>Cargando...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('loading').innerHTML = '<div style="padding:20px;color:white;"><h2>Error</h2><p>' + msg + '</p><p>Línea: ' + line + '</p></div>';
        return false;
      };
    </script>
  </body>
</html>
